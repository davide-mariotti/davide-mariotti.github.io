<!doctype html>
<html lang="it">

<head>
    <title>RunStats | Accedi</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="Accedi a RunStats per analizzare i tuoi allenamenti di corsa dal Garmin.">

    <!-- CSS -->
    <link href="/assets/css/main.css" rel="stylesheet" crossorigin="anonymous" />
    <link href="/assets/css/running/running.css" rel="stylesheet" crossorigin="anonymous" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">

    <!-- Icons -->
    <link rel="icon" href="/assets/icons/favicon/favicon.ico" type="image/x-icon">
    <link rel="apple-touch-icon" href="/assets/icons/favicon/apple-touch-icon.png">
</head>

<body>
    <div id="loader"></div>
    <app-header></app-header>

    <main class="login-page">
        <div class="login-card glass-panel">
            <span class="login-logo">🏃</span>

            <h1 class="login-title">Run<span class="text-gradient">Stats</span></h1>
            <p class="login-subtitle">Analisi intelligente delle tue corse Garmin</p>

            <ul class="login-features">
                <li>📊 Dashboard con statistiche personali</li>
                <li>📁 Importa attività GPX da Garmin Connect</li>
                <li>📈 Grafici di volume e trend del passo</li>
                <li>☁️ Dati sincronizzati e sicuri nel cloud</li>
            </ul>

            <button id="btn-google-login" class="btn-google">
                <!-- Google Logo SVG -->
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="22" height="22">
                    <path fill="#FFC107" d="M43.6 20H24v8h11.3C33.6 33.3 29.3 36 24 36c-6.6 0-12-5.4-12-12s5.4-12 12-12c3 0 5.8 1.1 7.9 3l5.7-5.7C34.1 6.5 29.3 4 24 4 12.9 4 4 12.9 4 24s8.9 20 20 20c11 0 20-8 20-20 0-1.3-.1-2.7-.4-4z" />
                    <path fill="#FF3D00" d="M6.3 14.7l6.6 4.8C14.5 15.1 18.9 12 24 12c3 0 5.8 1.1 7.9 3l5.7-5.7C34.1 6.5 29.3 4 24 4c-7.7 0-14.4 4.4-17.7 10.7z" />
                    <path fill="#4CAF50" d="M24 44c5.2 0 9.9-1.9 13.5-5l-6.2-5.2C29.5 35.6 26.9 36.5 24 36.5c-5.2 0-9.6-3.4-11.2-8.1l-6.5 5C9.3 39.2 16.1 44 24 44z" />
                    <path fill="#1565C0" d="M43.6 20H24v8h11.3c-.8 2.4-2.4 4.5-4.4 6l6.2 5.2C40.8 35.7 44 30.3 44 24c0-1.3-.1-2.7-.4-4z" />
                </svg>
                Accedi con Google
            </button>

            <p id="login-error" class="text-danger mt-3 small d-none"></p>

            <p class="login-note">
                🔒 I tuoi dati sono privati e visibili solo a te.
            </p>
        </div>
    </main>

    <app-footer></app-footer>

    <!-- Scripts -->
    <script src="/assets/js/components.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
        crossorigin="anonymous"></script>
    <script src="/assets/js/main.js" crossorigin="anonymous"></script>

    <script type="module">
        import { onAuthChange, loginWithGoogle } from '/assets/js/running/auth.js';

        // Se già loggato → vai alla dashboard
        onAuthChange(user => {
            if (user) window.location.href = '/running/';
        });

        const btn = document.getElementById('btn-google-login');
        const errEl = document.getElementById('login-error');

        btn.addEventListener('click', async () => {
            btn.disabled = true;
            btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span> Accesso in corso...';
            errEl.classList.add('d-none');

            try {
                await loginWithGoogle();
                // Il redirect avviene tramite onAuthChange
            } catch (err) {
                console.error('Login error:', err);
                errEl.textContent = '⚠️ Accesso non riuscito. Riprova.';
                errEl.classList.remove('d-none');
                btn.disabled = false;
                btn.innerHTML = `
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="22" height="22">
                        <path fill="#FFC107" d="M43.6 20H24v8h11.3C33.6 33.3 29.3 36 24 36c-6.6 0-12-5.4-12-12s5.4-12 12-12c3 0 5.8 1.1 7.9 3l5.7-5.7C34.1 6.5 29.3 4 24 4 12.9 4 4 12.9 4 24s8.9 20 20 20c11 0 20-8 20-20 0-1.3-.1-2.7-.4-4z"/>
                        <path fill="#FF3D00" d="M6.3 14.7l6.6 4.8C14.5 15.1 18.9 12 24 12c3 0 5.8 1.1 7.9 3l5.7-5.7C34.1 6.5 29.3 4 24 4c-7.7 0-14.4 4.4-17.7 10.7z"/>
                        <path fill="#4CAF50" d="M24 44c5.2 0 9.9-1.9 13.5-5l-6.2-5.2C29.5 35.6 26.9 36.5 24 36.5c-5.2 0-9.6-3.4-11.2-8.1l-6.5 5C9.3 39.2 16.1 44 24 44z"/>
                        <path fill="#1565C0" d="M43.6 20H24v8h11.3c-.8 2.4-2.4 4.5-4.4 6l6.2 5.2C40.8 35.7 44 30.3 44 24c0-1.3-.1-2.7-.4-4z"/>
                    </svg>
                    Accedi con Google`;
            }
        });
    </script>
</body>

</html>
