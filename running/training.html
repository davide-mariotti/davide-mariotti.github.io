<!doctype html>
<html lang="it">

<head>
    <title>RunStats | Piano Maratona</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="Il tuo piano di allenamento per la maratona — 35 settimane di progressione.">

    <!-- CSS -->
    <link href="/assets/css/main.css" rel="stylesheet" crossorigin="anonymous" />
    <link href="/assets/css/running/running.css" rel="stylesheet" crossorigin="anonymous" />
    <link href="/running/training.css" rel="stylesheet" crossorigin="anonymous" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">

    <!-- Icons -->
    <link rel="icon" href="/assets/icons/favicon/favicon.ico" type="image/x-icon">
    <link rel="apple-touch-icon" href="/assets/icons/favicon/apple-touch-icon.png">
</head>

<body>
    <div id="loader"></div>
    <app-header></app-header>

    <div class="container py-4 mt-5">

        <!-- HERO -->
        <div class="run-hero d-flex flex-wrap align-items-center justify-content-between gap-3 mb-4">
            <div>
                <h1 class="mb-0">🏅 Piano <span class="text-gradient">Maratona</span></h1>
                <p class="small mb-0 mt-1 opacity-50">35 settimane · Build progressivo verso la maratona</p>
            </div>
            <a href="/running/" class="btn btn-sm btn-outline-light rounded-pill">← Dashboard</a>
        </div>

        <!-- STAT SUMMARY CARDS -->
        <div class="row g-3 mb-4" id="summary-cards">
            <div class="col-6 col-md-3">
                <div class="stat-card glass-panel text-center">
                    <span class="stat-icon">📅</span>
                    <span class="stat-value">35</span>
                    <span class="stat-label">Settimane totali</span>
                </div>
            </div>
            <div class="col-6 col-md-3">
                <div class="stat-card glass-panel text-center">
                    <span class="stat-icon">📏</span>
                    <span class="stat-value" id="total-km">—</span>
                    <span class="stat-label">km pianificati</span>
                </div>
            </div>
            <div class="col-6 col-md-3">
                <div class="stat-card glass-panel text-center">
                    <span class="stat-icon">⛰️</span>
                    <span class="stat-value" id="peak-km">—</span>
                    <span class="stat-label">km settimana picco</span>
                </div>
            </div>
            <div class="col-6 col-md-3">
                <div class="stat-card glass-panel text-center">
                    <span class="stat-icon">🗓️</span>
                    <span class="stat-value" id="current-week-label">—</span>
                    <span class="stat-label">settimana corrente</span>
                </div>
            </div>
        </div>

        <!-- CHARTS ROW -->
        <div class="row g-4 mb-4">
            <!-- Volume settimanale -->
            <div class="col-12 col-lg-8">
                <div class="glass-panel chart-panel">
                    <h5>📊 Volume settimanale (km)</h5>
                    <canvas id="chart-volume" height="130"></canvas>
                </div>
            </div>
            <!-- Distribuzione tipi allenamento -->
            <div class="col-12 col-lg-4">
                <div class="glass-panel chart-panel">
                    <h5>🥧 Distribuzione km</h5>
                    <div class="d-flex align-items-center justify-content-center" style="height: calc(100% - 2rem);">
                        <canvas id="chart-distribution" style="max-height: 200px;"></canvas>
                    </div>
                </div>
            </div>
        </div>

        <!-- NAVIGATION: fasi -->
        <div class="mb-3 d-flex flex-wrap gap-2 align-items-center">
            <span class="filter-label">Filtra fase:</span>
            <button class="btn btn-sm filter-btn active trn-phase-btn" data-phase="all">Tutte</button>
            <button class="btn btn-sm filter-btn trn-phase-btn" data-phase="build">Build</button>
            <button class="btn btn-sm filter-btn trn-phase-btn" data-phase="recovery">Scarico</button>
            <button class="btn btn-sm filter-btn trn-phase-btn" data-phase="taper">Taper</button>
            <button class="btn btn-sm filter-btn trn-phase-btn" data-phase="race">Gara</button>
            <span class="ms-auto small opacity-40 text-white">Clicca una settimana per i dettagli</span>
        </div>

        <!-- WEEK CARDS GRID -->
        <div class="row g-3 mb-5" id="weeks-grid"></div>

    </div>

    <!-- WEEK DETAIL MODAL -->
    <div class="modal fade" id="weekModal" tabindex="-1" aria-labelledby="weekModalLabel" aria-hidden="true">
        <div class="modal-dialog modal-lg modal-dialog-centered">
            <div class="modal-content trn-modal-content">
                <div class="modal-header border-0 pb-0">
                    <h5 class="modal-title" id="weekModalLabel">—</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"
                        aria-label="Chiudi"></button>
                </div>
                <div class="modal-body pt-2" id="weekModalBody">
                    <!-- Rendered by JS -->
                </div>
            </div>
        </div>
    </div>

    <app-footer></app-footer>

    <!-- Scripts -->
    <script src="/assets/js/components.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
        crossorigin="anonymous"></script>
    <script src="/assets/js/main.js" crossorigin="anonymous"></script>
    <script src="/running/training.js"></script>
</body>

</html>
