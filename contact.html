---
title: Contact Me
description: Get in touch with Davide Mariotti for web development, design, or collaboration inquiries.
---
<!doctype html>
<html lang="en">

<head>
{% include head.html %}
    <link rel="stylesheet" href="/assets/css/contact.css" />
</head>

<body>
    <div id="loader"></div>
    {% include menu.html %}

    <div class="container py-5 mt-5">
        <div class="row justify-content-center">
            <div class="col-12 col-md-8 col-lg-6">
                <div class="glass-panel p-5 text-center">
                    <h1 class="section-title mb-4">Contact <span class="text-gradient">ME</span></h1>
                    <p class="mb-5 text-white opacity-75">Have a project in mind? Let's chat.</p>

                    <form action="https://formspree.io/f/xgegdzdy" method="POST" id="contact-form">
                        <input type="hidden" name="_subject" value="Contact request from davide-mariotti.github.io" />

                        <div class="mb-4 text-start">
                            <label for="email" class="form-label text-white small opacity-75">Email Address</label>
                            <input type="email" id="email" name="_replyto" class="form-control" placeholder="name@example.com"
                                required>
                        </div>

                        <div class="mb-4 text-start">
                            <label for="message" class="form-label text-white small opacity-75">Message</label>
                            <textarea id="message" name="message" class="form-control" rows="5"
                                placeholder="Tell me about your project..." required></textarea>
                        </div>

                        <button type="submit" class="btn btn-glow btn-primary w-100 py-3 rounded-pill">Send
                            Message</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    {% include footer.html %}

{% include scripts.html %}
</body>

</html>
